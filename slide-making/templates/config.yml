# paper-to-lecture configuration
# Generated by /paper-to-lecture negotiation phase
# Edit manually or run /paper-to-lecture --config to re-negotiate

# --- User Preferences (from negotiation) ---
topic: ""                          # Lecture topic/title
papers: []                         # List of {path, short_name} objects
#  - path: material/example.pdf
#    short_name: "Author-Year"

output_formats:                    # list of output formats to generate
  - beamer                         # beamer (LaTeX PDF) | html (Reveal.js) | both
story_arc: cinematic               # cinematic | chronological | thematic | custom
proof_depth: key_steps             # sketch | key_steps | full
theme: stanford_red                # stanford_red | mit_blue | chicago_maroon | custom | minimal
theme_primary_rgb: "140,21,21"     # Override for custom theme
theme_accent_rgb: "0,51,102"       # Override for custom theme
theme_green_rgb: "0,98,73"         # Success/mechanism color
viz_density: standard              # minimal | standard | maximum
figure_handling: tikz_only          # tikz_only | embed_when_possible | ask_per_figure
audience: graduate                 # graduate | undergrad | executive
pedagogy: socratic                 # socratic | lecture | seminar

# --- Course / Event Info (optional) ---
course_name: ""                    # e.g., "MSE 347"
week_label: ""                     # e.g., "Week 5"
author: ""                         # e.g., "Your Name"
institution: ""                    # e.g., "Stanford University"
event_name: ""                     # e.g., "AI Workshop — Encode Club"
date: ""                           # e.g., "2026-03-16"
duration_minutes: 50               # talk duration in minutes

# --- Progress Tracking (auto-updated) ---
progress:
  step1_setup: not_started         # complete | in_progress | not_started
  step2_papers: {}                 # per-paper status: {short_name: status}
  step3_arc: not_started
  step4_combined: not_started
  step5_qa: not_started
  step6_slides: not_started
  step6_html: not_started           # complete | in_progress | not_started (html output)
  step2_figure_manifest: not_started  # complete | in_progress | not_started

# --- Theme Presets (do not edit) ---
_presets:
  stanford_red:
    primary: "140,21,21"
    accent: "0,51,102"
    green: "0,98,73"
    gray: "84,84,84"
  mit_blue:
    primary: "163,31,52"
    accent: "0,51,102"
    green: "0,98,73"
    gray: "84,84,84"
  chicago_maroon:
    primary: "128,0,0"
    accent: "21,50,81"
    green: "0,98,73"
    gray: "84,84,84"
  minimal:
    primary: "0,0,0"
    accent: "84,84,84"
    green: "0,98,73"
    gray: "150,150,150"
